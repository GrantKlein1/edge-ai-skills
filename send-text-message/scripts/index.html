<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script>
        // This is the exact global function the Edge AI app searches for
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                // The app passes the model's arguments as a JSON string
                const params = JSON.parse(data);
                const phoneNumber = params.phoneNumber;
                const messageBody = params.messageBody;
                
                // Clean the phone number and safely encode the text
                const cleanNumber = phoneNumber.replace(/[^0-9+]/g, '');
                const encodedBody = encodeURIComponent(messageBody);
                
                // Trigger the native iOS SMS deep link sheet
                window.location.href = `sms:${cleanNumber}&body=${encodedBody}`;
                
                // Return a success message back to the local model
                return JSON.stringify({ result: "Success: iOS SMS sheet opened." });
            } catch (error) {
                // If it fails, report it back to the model
                return JSON.stringify({ error: "Error launching SMS: " + error.message });
            }
        };
    </script>
</body>
</html>
